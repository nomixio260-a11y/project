<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#2b2f36" />
    <meta name="description" content="通信量を節約するプロキシ型ブラウザ" />
    <title>DataSaver Browser</title>
    <link rel="manifest" href="/public/manifest.webmanifest" />
    <link rel="icon" href="/public/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/public/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" href="/public/style.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="navbtns">
        <button id="back" class="iconbtn" type="button" title="戻る" aria-label="戻る" disabled>‹</button>
        <button id="forward" class="iconbtn" type="button" title="進む" aria-label="進む" disabled>›</button>
        <button id="reload" class="iconbtn" type="button" title="再読み込み" aria-label="再読み込み">⟳</button>
      </div>
      <form id="nav" class="nav">
        <input
          id="address"
          class="address"
          type="text"
          inputmode="url"
          enterkeyhint="go"
          placeholder="URLを入力（例: https://example.com）"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <button id="go" type="submit" class="go">移動</button>
      </form>
      <div class="opts">
        <label class="text-toggle">
          <input id="textmode" type="checkbox" />
          テキスト優先
        </label>
        <label class="text-toggle" title="JS駆動のSPAをサーバー側で描画して表示">
          <input id="spamode" type="checkbox" />
          SPA表示
        </label>
        <span id="savings" class="savings" hidden></span>
      </div>
    </header>
    <div id="progress" class="progress" hidden><span class="bar"></span></div>
    <main class="viewport">
      <iframe id="page" title="ページ表示" referrerpolicy="no-referrer"></iframe>
      <div id="welcome" class="welcome">
        <img class="welcome-logo" src="/public/icon.svg" alt="" width="56" height="56" />
        <h1>DataSaver Browser</h1>
        <p>URLを入力すると、サーバー側でページを取得・圧縮して表示します。</p>
        <ul>
          <li>画像はWebPへ再圧縮し、<strong>お使いの端末の画面幅に合わせて縮小</strong></li>
          <li>広告・スクリプト・トラッカーを除去</li>
          <li>動画は高効率コーデック(AV1/VP9)へ再エンコード</li>
          <li>HTML/CSSを最小化し、Brotliで圧縮配信</li>
        </ul>
        <p class="hint">スマホ・タブレット・PCに対応。ホーム画面に追加してアプリのように使えます。</p>
      </div>
    </main>
    <script src="/public/app.js"></script>
  </body>
</html>
